<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist - Schneider Bebidas</title>

<style>
 body {
   font-family: Arial, sans-serif;
   margin: 20px;
 }
 table {
   width: 100%;
   border-collapse: collapse;
   margin-top: 20px;
 }
 th, td {
   border: 1px solid #ccc;
   padding: 10px;
   text-align: left;
 }
 th {
   background: #f2f2f2;
 }
 button {
   margin-top: 20px;
   padding: 10px 15px;
   font-size: 16px;
   cursor: pointer;
 }
 .logo {
   width: 150px;
   margin-bottom: 20px;
 }
</style>

<script>
function gerarRelatorio() {

    const atividades = document.querySelectorAll("input[type=checkbox]");
    let relatorio = "Relatório de Checklist%0A";
    const agora = new Date();
    relatorio += "Data e hora: " + agora.toLocaleString("pt-BR") + "%0A%0A";

    atividades.forEach(a => {
        relatorio += (a.checked ? "[X] " : "[ ] ") + a.dataset.nome + "%0A";
    });

    const numero = "5541996515546";
    const url = "https://wa.me/" + numero + "?text=" + relatorio;

    window.open(url, "_blank");
}
</script>
</head>

<body>

<!-- ✅ LOGO CORRETA — ESTA LINHA É O QUE FALTAVA!! -->
<img src="Base64.jpeg" alt="Logo" class="logo">

<h2>Checklist Diário</h2>

<table>
<tr><th>Feito</th><th>Atividade</th></tr>

<tr>
  <td><input type="checkbox" data-nome="Abrir o caixa"></td>
  <td>Abrir o caixa</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Passar um pano na loja"></td>
  <td>Passar um pano na loja</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Tirar o pó das garras e condolas"></td>
  <td>Tirar o pó das garras e condolas</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Efetuar contagem ciclica"></td>
  <td>Efetuar contagem cíclica</td>
</tr>

</table>

<button onclick="gerarRelatorio()">Enviar Relatório via WhatsApp</button>

</body>
</html>
