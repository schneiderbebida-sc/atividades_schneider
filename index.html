<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist - Schneider Bebidas</title>

<style>
 body {
   font-family: Arial, sans-serif;
   margin: 20px;
 }
 table {
   width: 100%;
   border-collapse: collapse;
   margin-top: 20px;
 }
 th, td {
   border: 1px solid #ccc;
   padding: 10px;
   text-align: left;
 }
 th {
   background: #f2f2f2;
 }
 button {
   margin-top: 20px;
   padding: 12px 18px;
   font-size: 16px;
   cursor: pointer;
   background-color: #25D366;
   color: white;
   border: none;
   border-radius: 5px;
 }
 button:hover {
   background-color: #1ebe5d;
 }
 .logo {
   width: 150px;
   margin-bottom: 20px;
 }
</style>

<script>
async function gerarRelatorio() {

    const atividades = document.querySelectorAll("input[type=checkbox]");
    let relatorio = "📋 *Relatório de Checklist*\n";

    const agora = new Date();
    relatorio += "🕒 Data e hora: " + agora.toLocaleString("pt-BR") + "\n\n";

    atividades.forEach(a => {
        relatorio += (a.checked ? "✅ " : "⬜ ") + a.dataset.nome + "\n";
    });

    // 📱 MOBILE (melhor experiência)
    if (navigator.share) {
        try {
            await navigator.share({
                title: "Checklist Diário",
                text: relatorio
            });
        } catch (err) {
            alert("Compartilhamento cancelado.");
        }
    } 
    
    // 💻 DESKTOP (fallback)
    else {
        try {
            await navigator.clipboard.writeText(relatorio);
            window.open("https://web.whatsapp.com", "_blank");
            alert("Relatório copiado! Abra o grupo e cole 👍");
        } catch (err) {
            alert("Erro ao copiar. Copie manualmente:\n\n" + relatorio);
        }
    }
}
</script>
</head>

<body>

<img src="Base64.jpeg" alt="Logo" class="logo">

<h2>Checklist Diário</h2>

<table>
<tr><th>Feito</th><th>Atividade</th></tr>

<tr>
  <td><input type="checkbox" data-nome="Ativar o Ifood"></td>
  <td>Ativar o Ifood</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Pausar itens zerados no Ifood e ativar os novos"></td>
  <td>Pausar itens zerados no Ifood e ativar os novos itens com saldo</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Abrir o caixa"></td>
  <td>Abrir o caixa</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Passar um pano na loja"></td>
  <td>Passar um pano na loja</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Tirar o pó das garrafas e gôndolas"></td>
  <td>Tirar o pó das garrafas e gôndolas</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Efetuar contagem cíclica"></td>
  <td>Efetuar contagem cíclica</td>
</tr>

</table>

<button onclick="gerarRelatorio()">📲 Enviar Relatório</button>

</body>
</html>
