<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Checklist - Schneider Bebidas</title>

<style>
 body {
   font-family: Arial, sans-serif;
   margin: 20px;
 }
 table {
   width: 100%;
   border-collapse: collapse;
   margin-top: 20px;
 }
 th, td {
   border: 1px solid #ccc;
   padding: 10px;
   text-align: left;
 }
 th {
   background: #f2f2f2;
 }
 button {
   margin-top: 20px;
   padding: 10px 15px;
   font-size: 16px;
   cursor: pointer;
 }
 .logo {
   width: 150px;
   margin-bottom: 20px;
 }
</style>

<script>
function gerarRelatorio() {

    const atividades = document.querySelectorAll("input[type=checkbox]");
    let relatorio = "📋 Relatório de Checklist\n";

    const agora = new Date();
    relatorio += "🕒 Data e hora: " + agora.toLocaleString("pt-BR") + "\n\n";

    atividades.forEach(a => {
        relatorio += (a.checked ? "✅ " : "⬜ ") + a.dataset.nome + "\n";
    });

    // Copiar automaticamente
    navigator.clipboard.writeText(relatorio);

    // Abrir grupo do WhatsApp
    window.open("https://web.whatsapp.com", "_blank");

    alert("Relatório copiado! Agora é só colar no grupo Schneider - Itapema Meia Praia 👍");
}
</script>
</head>

<body>

<img src="Base64.jpeg" alt="Logo" class="logo">

<h2>Checklist Diário</h2>

<table>
<tr><th>Feito</th><th>Atividade</th></tr>

<tr>
  <td><input type="checkbox" data-nome="Ativar o Ifood"></td>
  <td>Ativar o Ifood</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Pausar itens zerados na loja e ativar os novos"></td>
  <td>Pausar itens zerados na loja e ativar os novo itens com saldo no Ifood</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Abrir o caixa"></td>
  <td>Abrir o caixa</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Passar um pano na loja"></td>
  <td>Passar um pano na loja</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Tirar o pó das garrafas e gondolas"></td>
  <td>Tirar o pó das garrafas e gondolas</td>
</tr>

<tr>
  <td><input type="checkbox" data-nome="Efetuar contagem ciclica"></td>
  <td>Efetuar contagem cíclica</td>
</tr>

</table>

<button onclick="gerarRelatorio()">Enviar Relatório para o Grupo</button>

</body>
</html>
